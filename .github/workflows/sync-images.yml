name: Sync card images

on:
  schedule:
    # Run daily at 03:30 UTC (30min after sync-cards cron adds new cards to DB)
    - cron: "30 3 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download missing images
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node sync.mjs

      - name: Check for new images
        id: check
        run: |
          NEW_COUNT=$(git status --porcelain -- pocket/ | grep '^\?' | wc -l | tr -d ' ')
          echo "new_count=$NEW_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $NEW_COUNT new images"

      - name: Commit and push
        if: steps.check.outputs.new_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pocket/
          git commit -m "Add ${{ steps.check.outputs.new_count }} new card images"
          git push

      - name: Notify via email
        if: steps.check.outputs.new_count != '0' && secrets.MAIL_USERNAME != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "20cards — ${{ steps.check.outputs.new_count }} nuove immagini carte sincronizzate"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: 20cards Bot <${{ secrets.MAIL_USERNAME }}>
          body: |
            ${{ steps.check.outputs.new_count }} nuove immagini carte sono state scaricate e sono live su jsDelivr CDN.

            Vedi commit: https://github.com/matteobanchelli/20cards-images/commits/main

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.new_count }}" != "0" ]; then
            echo "### New card images added: ${{ steps.check.outputs.new_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "Images are now live on jsDelivr CDN." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No new images found" >> "$GITHUB_STEP_SUMMARY"
            echo "All card images are up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
